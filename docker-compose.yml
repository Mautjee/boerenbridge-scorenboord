version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - sqlite-data:/data
    environment:
      - NODE_ENV=production
      - DATABASE_URL=/data/sqlite.db
      - PORT=3000
    restart: unless-stopped

volumes:
  sqlite-data:
